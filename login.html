<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindAdvance - Login</title> <link rel="icon" href="logo mind.png" type="image/png">
    <link rel="shortcut icon" href="logo mind.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="login_responsive.css">
    
</head>
<body>
    <div class="container">
        <img src="logo mind.png" alt="MindAdvance Logo" class="logo">
        <h1>Entrar na plataforma</h1>
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope input-icon" aria-hidden="true" title="Ícone de E-mail"></i>
                <input type="email" id="email" placeholder="E-mail" required autocomplete="email">
            </div>

            <div class="input-group">
                <i class="fas fa-lock input-icon" aria-hidden="true" title="Ícone de Senha"></i>
                <input type="password" id="password" placeholder="Senha" required autocomplete="current-password">
            </div>

            <button type="submit">Entrar</button>
        </form>

        <p>Não tem uma conta? <a href="signup.html">Inscrever-se</a></p>
        <h6>Essa é apenas uma página de demonstração.</h6>
        <h6>Não é necessário colocar informações verdadeiras</h6>
    </div>
    <script src="login.js"></script>
</body>
</html>
